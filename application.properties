# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── File upload limits ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=32MB
spring.servlet.multipart.max-request-size=32MB

# ── Deepfake inference ───────────────────────────────────────────────────────
# Path to infer.py relative to where you launch the JAR (or use absolute path)
# Default assumes JAR is run from inside the deepfake-gui/ folder:
deepfake.infer-script=../infer.py

# Python command — change to "python3" or a venv path if needed
# deepfake.python-cmd=python3
deepfake.python-cmd=python

# Inference timeout in seconds
deepfake.timeout-seconds=60

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.deepfake=DEBUG
